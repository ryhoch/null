<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://null-signaling-production.up.railway.app ws://localhost:*; media-src 'self' blob:;"
    />
    <title>Null — Encrypted Messaging</title>
    <meta name="description" content="End-to-end encrypted P2P messaging. No phone number, no email — just an Ethereum keypair." />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0a;
        --bg-surface: #111111;
        --bg-surface-2: #181818;
        --bg-hover: #1a1a1a;
        --green: #00ff41;
        --green-dim: #00aa2a;
        --green-faint: rgba(0, 255, 65, 0.08);
        --red: #ff4444;
        --amber: #ffaa00;
        --muted: #555555;
        --text: #cccccc;
        --border: #222222;
        --font: "Courier New", Courier, monospace;
      }

      body {
        background: var(--bg);
        color: var(--green);
        font-family: var(--font);
        height: 100vh;
        overflow: hidden;
        user-select: none;
      }

      #root {
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      input,
      textarea,
      button {
        font-family: var(--font);
      }

      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.15); }
      }

      @keyframes typingDot {
        0%, 60%, 100% { opacity: 0.2; transform: translateY(0); }
        30% { opacity: 1; transform: translateY(-3px); }
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Mobile-responsive layout */
      @media (max-width: 600px) {
        body {
          height: 100dvh;
          overflow: hidden;
        }
        #root {
          height: 100dvh;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
